<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripAdvisor — Plan smarter trips by budget, weather &amp; vibe</title>
    <meta name="description" content="Discover the best country to visit by budget, travel month, terrain and vibe. Compare 79+ destinations side-by-side with auto currency conversion." />
    <meta name="author" content="TripAdvisor" />
    <link rel="canonical" href="/" />
    <script>
      if (window.location.hostname.includes("github.io")) {
        window.location.href = "https://trip-advisor-jade.vercel.app" + window.location.pathname;
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:title" content="TripAdvisor — Plan smarter trips by budget, weather &amp; vibe" />
    <meta name="twitter:title" content="TripAdvisor — Plan smarter trips by budget, weather &amp; vibe" />
    <meta property="og:description" content="Compare 79+ destinations on cost, terrain, vibe and Japan-likeness." />
    <meta name="twitter:description" content="Compare 79+ destinations on cost, terrain, vibe and Japan-likeness." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta property="og:image" content="/ogimage.png" />
    <meta name="twitter:image" content="/ogimage.png" />

    <style>
      /* Hide Google Translate's top banner & tooltip while keeping translation active */
      .goog-te-banner-frame.skiptranslate,
      .goog-tooltip,
      .goog-tooltip:hover,
      #goog-gt-tt,
      .VIpgJd-ZVi9od-l4eHX-hSRGPd,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf { display: none !important; }
      body { top: 0 !important; }
      /* Don't translate brand chips / numbers */
      .notranslate { unicode-bidi: isolate; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages: "en,hi,gu,ta,te,bn,mr,pa,ur,fr,es,de,it,pt,ja,ko,zh-CN,ar,ru,th,vi,id",
            autoDisplay: false,
          },
          "google_translate_element"
        );
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
