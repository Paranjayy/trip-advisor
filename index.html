<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripAdvisor | Smart Travel Dashboard</title>
    <meta name="description" content="Cyber-travel engine for smart planning. Compare budget, vibes, and telemetry for 79+ countries." />
    
    <!-- OG Tags -->
    <meta property="og:title" content="TripAdvisor | Cyber-Travel Engine" />
    <meta property="og:description" content="Smart travel planning with real costs, weather windows, and Japan-vibe telemetry." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TripAdvisor | Cyber-Travel Engine" />
    <meta name="twitter:description" content="Smart travel planning with real costs, weather windows, and Japan-vibe telemetry." />
    <meta name="twitter:image" content="/og-image.png" />

    <meta name="author" content="TripAdvisor" />
    <link rel="canonical" href="/" />

    <style>
      /* Hide Google Translate's top banner & tooltip while keeping translation active */
      .goog-te-banner-frame.skiptranslate,
      .goog-tooltip,
      .goog-tooltip:hover,
      #goog-gt-tt,
      .VIpgJd-ZVi9od-l4eHX-hSRGPd,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf { display: none !important; }
      body { top: 0 !important; }
      /* Don't translate brand chips / numbers */
      .notranslate { unicode-bidi: isolate; }
      /* Page Progress Bar */
      #scroll-progress {
        position: fixed;
        top: 0;
        left: 0;
        width: 0%;
        height: 3px;
        background: linear-gradient(to right, hsl(var(--primary)), hsl(var(--accent)));
        z-index: 10000;
        transition: width 0.1s ease-out;
        box-shadow: 0 0 10px rgba(var(--primary), 0.5);
      }
    </style>
    <script>
      window.addEventListener('scroll', () => {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        const bar = document.getElementById("scroll-progress");
        if (bar) bar.style.width = scrolled + "%";
      });
    </script>
  </head>

  <body>
    <div id="scroll-progress"></div>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages: "en,hi,gu,ta,te,bn,mr,pa,ur,fr,es,de,it,pt,ja,ko,zh-CN,ar,ru,th,vi,id",
            autoDisplay: false,
          },
          "google_translate_element"
        );
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
